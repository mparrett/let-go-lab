<!--
  Client-owned shell for the mandelbrot demo, bound to let-go ONLY through
  window.LetGoHost (onReady/onOutput/sendInput/setSize). Adds @xterm/addon-image
  so raw sixel DCS strings written by the .lg program (via term/write) decode to
  pixels. Content-sized to the image; baked into the bundle by inject-shell.sh.

  To adapt for a new demo: copy this file, change IMAGE_W/IMAGE_H/CHROME_ROWS to
  match your program's image size and status rows.
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-image@0.8.0/lib/addon-image.min.js"></script>
<style>
  html, body { background: #000; margin: 0; height: 100%; }
  /* Content-sized terminal box (relayout sizes it to the image + text rows),
     horizontally centered. Vertically: TOP on portrait/mobile (black fills
     below), CENTERED on landscape/desktop (letterbox). Overrides the lg host's
     body{flex-direction:column} #terminal{flex:1} (which would fill the screen). */
  body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  @media (orientation: landscape) { body { justify-content: center; } }
  /* transition eases the pop-to-bright when a freshly computed frame lands */
  #terminal { flex: 0 0 auto; transition: filter 0.15s ease-out; }
</style>
<script>
  (function () {
    const term = new Terminal({
      fontFamily: '"IBM Plex Mono", Menlo, Consolas, monospace',
      fontSize: 14,
      theme: { background: '#000', foreground: '#cfcfcf', cursor: '#000' },
      allowProposedApi: true,   // required by addon-image
      convertEol: false,       // the .lg emits explicit \r\n; don't double-convert
      scrollback: 0,            // a single full-screen image; no history to scroll
    });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);

    // Sixel decoder. pixelLimit bumped well past the default so a full-window
    // render isn't truncated. sixelSupport defaults true; spelled out for intent.
    const image = new ImageAddon.ImageAddon({
      sixelSupport: true,
      pixelLimit: 4096 * 4096,
      sixelSizeLimit: 25_000_000,   // bytes per DCS string; our frames are large
    });
    term.loadAddon(image);

    // Geometry. mandelbrot.lg owns it and announces it via a private OSC 5002
    // (parsed in onOutput below), so nothing here is hand-synced with the program
    // (issue #6 / the P3 geometry-duplication finding). These are only fallbacks
    // for the brief window before the announcement lands; they equal the program's
    // defaults (compute grid CW×CH, CHROME_ROWS, left margin = COL0-1) so the very
    // first layout already picks the right scale. The image is GRID_W*scale ×
    // GRID_H*scale px; the shell picks the largest integer scale that fits the
    // viewport and tells the program via an "S<n>" key (sendInput).
    let GRID_W = 160, GRID_H = 120, CHROME_ROWS = 8, MARGIN_COLS = 1;
    const SCALE_MIN = 1, SCALE_MAX = 3;
    let lastSentScale = null;
    function cellDims() {
      try {
        const d = term._core._renderService.dimensions.css.cell;
        if (d && d.width && d.height) return { w: d.width, h: d.height };
      } catch (_) {}
      const f = term.options.fontSize;
      return { w: 0.6 * f, h: 1.2 * f };
    }

    // Image cols/rows (incl. chrome) at a given integer scale, for the measured
    // cell size. The image is GRID_W*scale × GRID_H*scale px.
    function gridFor(scale, cell) {
      return {
        cols: Math.ceil((GRID_W * scale) / cell.w) + MARGIN_COLS,
        rows: Math.ceil((GRID_H * scale) / cell.h) + CHROME_ROWS,
      };
    }

    let pending;
    function relayout() {
      const termEl = document.getElementById("terminal");
      termEl.style.width = "100vw";
      termEl.style.height = "100vh";          // full viewport so fit() seeds cell metrics
      fit.fit();
      const cell = cellDims();
      // Largest scale whose image+chrome fits the viewport; smallest if none do.
      // No Math.min cap on the grid (the old bug: it advertised a sub-image
      // extent while the program still emitted the full-size sixel, so the image
      // clipped and click mapping normalized across the wrong width).
      let scale = SCALE_MIN;
      for (let s = SCALE_MAX; s >= SCALE_MIN; s--) {
        const g = gridFor(s, cell);
        if (g.cols <= term.cols && g.rows <= term.rows) { scale = s; break; }
      }
      const g = gridFor(scale, cell);
      term.resize(g.cols, g.rows);
      termEl.style.width = Math.ceil(cell.w * g.cols) + "px";
      termEl.style.height = Math.ceil(cell.h * g.rows) + "px";
      if (window.LetGoHost && window.LetGoHost.setSize) window.LetGoHost.setSize(g.cols, g.rows);
      // Tell the program the fitted scale only when it changes — re-sending the
      // same scale would force a needless recompute, and two messages racing
      // into the 1-slot key ring while the program is mid-compute can drop one.
      if (window.LetGoHost && window.LetGoHost.sendInput && scale !== lastSentScale) {
        window.LetGoHost.sendInput("S" + scale);
        lastSentScale = scale;
      }
      window.__lgGrid = g.cols + "x" + g.rows;
      window.__lgScale = scale;
    }
    function scheduleRelayout() { clearTimeout(pending); pending = setTimeout(relayout, 100); }

    window.LetGoHost.onReady((mode) => {
      const statusEl = document.getElementById("status");
      if (statusEl) statusEl.style.display = "none";
      const termEl = document.getElementById("terminal");
      termEl.style.display = "block";
      term.open(termEl);
      relayout();
      term.focus();
      // Read-only test hook: lets the viewport/click test read a status row's
      // text from the xterm buffer (the coords row "x=… y=… zoom=…") to assert
      // click→complex mapping. Harmless inspection; no behavioral effect.
      window.__lgReadLine = (row) => {
        const line = term.buffer.active.getLine(row);
        return line ? line.translateToString(true).trim() : "";
      };
      // Private OSC 5000;{0|1} BEL toggles a "computing" dim cue on the whole
      // terminal box (the .lg emits it around the compute stall — see
      // mandelbrot.lg). Strip it before term.write so xterm never sees it;
      // native terminals ignore the unknown OSC, so the same .lg drives both.
      window.LetGoHost.onOutput((s) => {
        s = s.replace(/\x1b\]5000;([01])\x07/g, (_m, v) => {
          termEl.style.filter = v === "1" ? "saturate(0.35) brightness(0.5)" : "";
          return "";
        });
        // Geometry announcement (OSC 5002;CW;CH;CHROME;COL0). The program is the
        // single source of truth; adopt its values and relayout so the fitted
        // scale reflects them. Stripped before term.write (native ignores it).
        s = s.replace(/\x1b\]5002;(\d+);(\d+);(\d+);(\d+)\x07/g, (_m, cw, ch, chrome, col0) => {
          GRID_W = +cw; GRID_H = +ch; CHROME_ROWS = +chrome; MARGIN_COLS = +col0 - 1;
          scheduleRelayout();
          return "";
        });
        term.write(s);
      });
      if (mode === "worker") {
        term.onResize(({ cols, rows }) => window.LetGoHost.setSize(cols, rows));
        term.onData((d) => window.LetGoHost.sendInput(d));
      }
    });

    window.addEventListener("resize", scheduleRelayout);
    window.addEventListener("orientationchange", scheduleRelayout);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", scheduleRelayout);
  })();
</script>
