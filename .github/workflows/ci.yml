name: ci

# Smoke suite (#10): protocol/lifecycle/browser boundaries that have produced
# regressions. Runs scripts/ci.sh, which orchestrates the focused tests under
# test/. GitHub sets CI=true, so ci.sh runs in STRICT mode here — a missing
# expected test or tool fails the build (locally it soft-skips). Tool/dependency
# versions and the let-go commit are pinned so CI is reproducible.
on:
  push:
    branches: [main]
  pull_request:

env:
  # Pinned let-go RELEASE (nooga/let-go). The lab never builds lg itself; it runs
  # a stock upstream build. v1.11.0 is the first tagged release carrying the
  # client-owned shell (-w-shell, #245), SGR mouse input (#313), and the IR/
  # lowering perf gains the sixel encoder benefits from — so it's also the
  # supported version floor (see README / CLAUDE.md). Pinning a tag keeps CI
  # reproducible while naming that floor; the full clone below fetches tags, so
  # `git checkout` resolves it. To bump: pick a newer tag, build + run
  # `scripts/ci.sh` against it locally, then update this value. Validated
  # 2026-06-28 (demo builds, bench + suite pass; bytes=27695).
  # Resolved SHA: f9048d899a740364b2aeb9a3ee046f8ea9956c5b
  LETGO_PIN: v1.11.0

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jq + shellcheck
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Install Playwright (chromium)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      # Build the pinned upstream let-go (LETGO_PIN) and point LETGO at it.
      # Full clone (not --depth 1) so the pinned tag/SHA is fetchable.
      - name: Build let-go (pinned upstream)
        run: |
          git clone https://github.com/nooga/let-go let-go-upstream
          git -C let-go-upstream checkout "$LETGO_PIN"
          make -C let-go-upstream build
          ln -sfn "$PWD/let-go-upstream" let-go
          ./let-go/lg --version || true

      - name: Smoke suite
        run: scripts/ci.sh
