name: ci

# Smoke suite (#10): protocol/lifecycle/browser boundaries that have produced
# regressions. Runs scripts/ci.sh, which orchestrates the focused tests under
# test/. Tool/dependency versions are pinned here so CI is reproducible.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jq + shellcheck
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Install Playwright (chromium)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      # The lab never builds lg itself; CI builds the upstream main the demos
      # target (see harness/vendor + provenance) and points LETGO at it.
      - name: Build let-go (upstream main)
        run: |
          git clone --depth 1 https://github.com/nooga/let-go let-go-upstream
          make -C let-go-upstream build
          ln -sfn "$PWD/let-go-upstream" let-go
          ./let-go/lg --version || true

      - name: Smoke suite
        run: scripts/ci.sh
